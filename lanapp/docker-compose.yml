services:
    postgres:
        image: postgres:16
        container_name: lanapp_postgres
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: adm1n*
            POSTGRES_DB: webapp
            TZ: America/Guayaquil
        ports:
            - '5434:5432'
        volumes:
            - lanapp_pg_data:/var/lib/postgresql/data
            - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U admin -d webapp']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    lanapp_pg_data:
